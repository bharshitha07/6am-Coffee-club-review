<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Coffee Reviews</title>

    <link rel="stylesheet" href="6 am.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
    
    <div class="overlay"></div>

    <!-- Vintage Background Animation -->
    <div class="overlay"></div>

    <!-- Main Container -->
    <div class="container">

        <!-- Header -->
        <div class="header">

            <!-- Logo -->
            <img src="C:\Users\reddy\OneDrive\Pictures\6am img.jpeg" class="logo">

            <!-- Cafe Name -->
            <h1>6 AM Coffee Club</h1>

            <p>Sit.Sip.Relax ☕🌅</p>

        </div>

        <!-- Coffee Smoke Animation -->

<div class="smoke-container">

    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>

</div>
        <!-- Review Box -->
        <div class="review-box">

            <!-- Coffee Rating -->
<<!-- Coffee Rating -->

<label>How was the Coffee?</label>

<div class="rating">

    <span class="sun" data-value="1">☀</span>
    <span class="sun" data-value="2">☀</span>
    <span class="sun" data-value="3">☀</span>
    <span class="sun" data-value="4">☀</span>
    <span class="sun" data-value="5">☀</span>

</div>

<!-- View Rating -->

<label>How was the View & Sitting?</label>

<div class="rating">

    <span class="sun" data-value="1">☀</span>
    <span class="sun" data-value="2">☀</span>
    <span class="sun" data-value="3">☀</span>
    <span class="sun" data-value="4">☀</span>
    <span class="sun" data-value="5">☀</span>

</div>

<!-- Service Rating -->

<label>How was the Service?</label>

<div class="rating">

    <span class="sun" data-value="1">☀</span>
    <span class="sun" data-value="2">☀</span>
    <span class="sun" data-value="3">☀</span>
    <span class="sun" data-value="4">☀</span>
    <span class="sun" data-value="5">☀</span>

</div>
            <!-- Message -->
            <textarea placeholder="Write your beautiful experience here..."></textarea>

            <!-- Button -->
            <button id="submitBtn">
                Submit Review
            </button>

        </div>

    </div>

    <!-- Popup -->
    <div class="popup" id="popup">

        <div class="popup-content">

            <h2>Thank You ☕</h2>

            <p>
                Thank You for visiting our club and being a part of us🌞.<br>
                Hope you love the coffee and the view⛅.<br>
                Please visit us again and share another coffee with your loved ones❤️
            </p>

            <button onclick="closePopup()">
                Close
            </button>

        </div>

    </div>

    <script src="6 am.js"></script>

</body>
</html>
